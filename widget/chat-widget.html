<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat BeneIT - Support Informatique</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #3b82f6;
            --text-color: #1f2937;
            --bg-color: #f9fafb;
            --chat-bg: #ffffff;
            --user-bubble: #e5f3ff;
            --agent-bubble: #f0f0f0;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
        }

        .chat-container {
            max-width: 400px;
            margin: 20px auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background-color: var(--chat-bg);
        }

        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 16px;
            text-align: center;
            font-weight: 600;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .agent-message {
            align-self: flex-start;
            background-color: var(--agent-bubble);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input {
            display: flex;
            padding: 16px;
            border-top: 1px solid var(--border-color);
            background-color: var(--chat-bg);
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            border-color: var(--primary-color);
        }

        .chat-input button {
            margin-left: 10px;
            padding: 10px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chat-input button:hover {
            background-color: var(--primary-light);
        }

        .chat-input button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 8px 14px;
            background-color: var(--agent-bubble);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background-color: #6b7280;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .devis-container {
            margin-top: 16px;
            padding: 16px;
            background-color: #f0fdf4;
            border-radius: 8px;
            border: 1px solid #86efac;
        }

        .devis-container h3 {
            color: #16a34a;
            margin-bottom: 12px;
        }

        .devis-container pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            font-size: 0.9rem;
            background-color: white;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
        }

        .error-message {
            color: #ef4444;
            background-color: #fee2e2;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 8px 0;
        }

        .restart-button {
            margin-top: 16px;
            padding: 10px 16px;
            background-color: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .restart-button:hover {
            background-color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            💬 Support BeneIT
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message agent-message">
                Bonjour ! Je suis l'assistant BeneIT. Décrivez-moi votre problème et je vous aiderai à trouver une solution.
            </div>
        </div>
        <div class="typing-indicator" id="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="chat-input">
            <input
                type="text"
                id="user-input"
                placeholder="Tapez votre message..."
                autocomplete="off"
                disabled
            >
            <button id="send-button" disabled>Envoyer</button>
        </div>
        <div id="devis-container" class="devis-container" style="display: none;"></div>
        <button id="restart-button" class="restart-button" style="display: none;">Nouvelle conversation</button>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:8000'; // À remplacer par l'URL de production
        // const API_BASE_URL = 'https://agent-ia-beneit.onrender.com'; // Exemple pour Render

        // État de l'application
        let sessionId = null;
        let isWaitingForResponse = false;
        let pretPourDevis = false;

        // Éléments DOM
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');
        const devisContainer = document.getElementById('devis-container');
        const restartButton = document.getElementById('restart-button');

        // Initialisation
        async function init() {
            try {
                // Créer une nouvelle session
                const response = await fetch(`${API_BASE_URL}/api/session`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Erreur lors de la création de la session: ${response.statusText}`);
                }

                const data = await response.json();
                sessionId = data.session_id;
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();

                addMessage('agent', 'Bonjour ! Je suis l\'assistant BeneIT. Décrivez-moi votre problème et je vous aiderai à trouver une solution.');
            } catch (error) {
                showError(`Erreur de connexion à l'API: ${error.message}`);
            }
        }

        // Ajouter un message à la conversation
        function addMessage(role, content, domaine = null) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(role === 'user' ? 'user-message' : 'agent-message');
            messageDiv.textContent = content;

            if (domaine) {
                const metaDiv = document.createElement('div');
                metaDiv.classList.add('message-meta');
                metaDiv.textContent = `Domaine: ${domaine}`;
                messageDiv.appendChild(metaDiv);
            }

            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Faire défiler vers le bas
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Afficher l'indicateur de saisie
        function showTypingIndicator() {
            typingIndicator.style.display = 'flex';
            scrollToBottom();
        }

        // Masquer l'indicateur de saisie
        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }

        // Afficher une erreur
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.classList.add('error-message');
            errorDiv.textContent = message;
            chatMessages.appendChild(errorDiv);
            scrollToBottom();
        }

        // Envoyer un message
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isWaitingForResponse) return;

            // Désactiver l'input pendant l'envoi
            userInput.disabled = true;
            sendButton.disabled = true;
            isWaitingForResponse = true;

            // Ajouter le message de l'utilisateur
            addMessage('user', message);
            userInput.value = '';

            // Afficher l'indicateur de saisie
            showTypingIndicator();

            try {
                // Envoyer le message à l'API
                const response = await fetch(`${API_BASE_URL}/api/conversation`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erreur API: ${response.statusText}`);
                }

                const data = await response.json();
                hideTypingIndicator();

                // Mettre à jour l'état
                pretPourDevis = data.pret_pour_devis;

                // Ajouter la réponse de l'agent
                addMessage('agent', data.response, data.domaine);

                // Si prêt pour le devis, proposer de générer le devis
                if (pretPourDevis) {
                    showDevisButton();
                }
            } catch (error) {
                hideTypingIndicator();
                showError(`Erreur: ${error.message}`);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                isWaitingForResponse = false;
                userInput.focus();
            }
        }

        // Afficher le bouton pour générer le devis
        function showDevisButton() {
            const devisButton = document.createElement('button');
            devisButton.textContent = 'Générer le devis';
            devisButton.style.marginTop = '12px';
            devisButton.style.padding = '10px 16px';
            devisButton.style.backgroundColor = '#16a34a';
            devisButton.style.color = 'white';
            devisButton.style.border = 'none';
            devisButton.style.borderRadius = '8px';
            devisButton.style.cursor = 'pointer';
            devisButton.style.width = '100%';

            devisButton.addEventListener('click', genererDevis);

            chatMessages.appendChild(devisButton);
            scrollToBottom();
        }

        // Générer le devis
        async function genererDevis() {
            if (!pretPourDevis || !sessionId) return;

            showTypingIndicator();
            userInput.disabled = true;
            sendButton.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/devis`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erreur API: ${response.statusText}`);
                }

                const data = await response.json();
                hideTypingIndicator();

                // Afficher le devis
                afficherDevis(data);
            } catch (error) {
                hideTypingIndicator();
                showError(`Erreur lors de la génération du devis: ${error.message}`);
            } finally {
                userInput.disabled = true;
                sendButton.disabled = true;
            }
        }

        // Afficher le devis
        function afficherDevis(data) {
            devisContainer.style.display = 'block';
            restartButton.style.display = 'block';

            const title = document.createElement('h3');
            title.textContent = '📄 Devis généré';

            const rapport = document.createElement('pre');
            rapport.textContent = data.rapport_markdown;

            devisContainer.innerHTML = '';
            devisContainer.appendChild(title);
            devisContainer.appendChild(rapport);
        }

        // Redémarrer la conversation
        function restartConversation() {
            // Réinitialiser l'état
            sessionId = null;
            pretPourDevis = false;
            isWaitingForResponse = false;

            // Réinitialiser l'UI
            chatMessages.innerHTML = '';
            devisContainer.style.display = 'none';
            restartButton.style.display = 'none';
            userInput.value = '';
            userInput.disabled = true;
            sendButton.disabled = true;

            // Recommencer
            init();
        }

        // Événements
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        restartButton.addEventListener('click', restartConversation);

        // Initialiser au chargement
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
